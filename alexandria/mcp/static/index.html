<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alexandria Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>Alexandria</h1>
  <span id="workspace-info"></span>
</header>
<main>
  <div class="stats" id="stats"></div>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search your knowledge base..." autofocus>
    <button id="search-btn">Search</button>
  </div>

  <div class="panel" id="search-results" style="display:none">
    <h2>Search Results</h2>
    <div class="panel-body" id="results-body"></div>
  </div>

  <div class="panel" id="doc-viewer">
    <h2 id="doc-title">Document</h2>
    <div class="panel-body"><pre class="doc-content" id="doc-content"></pre></div>
  </div>

  <div class="panel">
    <h2>Beliefs <span id="belief-count"></span></h2>
    <div class="panel-body" id="beliefs-body">
      <div class="empty">Loading...</div>
    </div>
  </div>
</main>
<script src="/static/app.js"></script>
</body>
</html>
